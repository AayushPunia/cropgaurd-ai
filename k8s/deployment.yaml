# ============================================================
# CropGuard AI — Kubernetes Deployment + Service
# Runs on K3s (single-node Kubernetes on EC2)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cropguard-ai
  labels:
    app: cropguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cropguard
  template:
    metadata:
      labels:
        app: cropguard
    spec:
      # No imagePullSecrets needed — ECR auth is handled by
      # K3s registries.yaml (refreshed by cron every 6 hours)
      containers:
      - name: cropguard-api
        image: IMAGE_PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - containerPort: 8000

        # Health checks — K3s uses these to manage traffic & restarts
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        # Resource limits — PyTorch model needs significant memory
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "6Gi"
            cpu: "2000m"

---
# ============================================================
# Service — Exposes the app on port 80 via K3s LoadBalancer
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: cropguard-service
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: cropguard