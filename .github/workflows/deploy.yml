name: Deploy CropGuard AI to K8s

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          context: .
          push: true
          tags: ${{ env.ECR_REGISTRY }}/cropguard-ai:${{ env.IMAGE_TAG }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inject Image Tag into Kubernetes Manifest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY/cropguard-ai:$IMAGE_TAG|g" k8s/deployment.yaml

      - name: Deploy to K3s on EC2
        uses: appleboy/scp-action@master
        with:
          host: 52.66.32.232
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/deployment.yaml"
          target: "~/"
      - name: Apply Kubernetes Configurations
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          host: 52.66.32.232
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            aws ecr get-login-password --region ap-south-1 | kubectl create secret docker-registry ecr-secret --docker-server=$REGISTRY --docker-username=AWS --docker-password-stdin --dry-run=client -o yaml | kubectl apply -f -
            kubectl apply -f ~/k8s/deployment.yaml
            kubectl rollout status deployment/cropguard-ai
      