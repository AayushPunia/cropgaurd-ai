<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CropGuard AI — Crop Disease Detection</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8faf8; color: #1a1a1a; min-height: 100vh; }
  header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 1rem 2rem; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 600; color: #166534; }
  header span { font-size: 13px; color: #6b7280; }
  .leaf { font-size: 24px; }
  main { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
  .upload-zone { background: #fff; border: 2px dashed #bbf7d0; border-radius: 16px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .upload-zone:hover, .upload-zone.dragover { border-color: #16a34a; background: #f0fdf4; }
  .upload-zone p { color: #6b7280; margin-top: 8px; font-size: 14px; }
  .upload-zone h2 { color: #374151; font-size: 18px; font-weight: 500; }
  #file-input { display: none; }
  .btn { background: #16a34a; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
  .btn:hover { background: #15803d; }
  .preview-wrap { display: none; margin-top: 1.5rem; }
  .preview-wrap img { width: 100%; max-height: 320px; object-fit: contain; border-radius: 12px; border: 1px solid #e5e7eb; }
  .result-card { background: #fff; border-radius: 16px; border: 1px solid #e5e7eb; padding: 1.5rem; margin-top: 1.5rem; display: none; }
  .result-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
  .disease-name { font-size: 20px; font-weight: 600; color: #111827; }
  .severity-badge { font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 999px; }
  .severity-None { background: #dcfce7; color: #166534; }
  .severity-Medium { background: #fef3c7; color: #92400e; }
  .severity-High { background: #fee2e2; color: #991b1b; }
  .severity-Critical { background: #ede9fe; color: #5b21b6; }
  .confidence-bar-wrap { margin-bottom: 1.25rem; }
  .confidence-label { font-size: 13px; color: #6b7280; margin-bottom: 4px; }
  .confidence-bar { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
  .confidence-fill { height: 8px; background: #16a34a; border-radius: 4px; transition: width 0.6s ease; }
  .info-section { margin-top: 1rem; }
  .info-label { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .info-text { font-size: 14px; color: #374151; line-height: 1.6; padding: 10px 14px; background: #f9fafb; border-radius: 8px; }
  .loading { display: none; text-align: center; padding: 2rem; color: #6b7280; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #16a34a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .latency { font-size: 11px; color: #9ca3af; margin-top: 1rem; text-align: right; }
  .top3 { margin-top: 1rem; border-top: 1px solid #e5e7eb; padding-top: 1rem; }
  .top3-item { display: flex; justify-content: space-between; font-size: 13px; color: #6b7280; padding: 3px 0; }
  .error-msg { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 1rem; color: #991b1b; font-size: 14px; margin-top: 1rem; display: none; }
</style>
</head>
<body>
<header>
  <span class="leaf">🌿</span>
  <h1>CropGuard AI</h1>
  <span>Instant crop disease detection · 38 disease classes</span>
</header>
<main>
  <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div style="font-size:48px;margin-bottom:12px">📷</div>
    <h2>Upload a crop leaf photo</h2>
    <p>Drag and drop or click to select · JPG, PNG, WEBP · max 10MB</p>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div class="preview-wrap" id="preview-wrap">
    <img id="preview-img" src="" alt="Uploaded leaf">
    <div style="margin-top:12px;text-align:center">
      <button class="btn" onclick="analyzeImage()">Analyze disease</button>
      <button style="margin-left:8px;background:none;border:1px solid #d1d5db;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px" onclick="resetUI()">Upload another</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Analyzing your crop image...</p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <div>
        <div class="disease-name" id="res-disease"></div>
        <div style="font-size:13px;color:#6b7280;margin-top:2px" id="res-class"></div>
      </div>
      <span class="severity-badge" id="res-severity"></span>
    </div>
    <div class="confidence-bar-wrap">
      <div class="confidence-label">Confidence: <strong id="res-conf-text"></strong></div>
      <div class="confidence-bar"><div class="confidence-fill" id="res-conf-bar" style="width:0%"></div></div>
    </div>
    <div class="info-section">
      <div class="info-label">Recommended treatment</div>
      <div class="info-text" id="res-cure"></div>
    </div>
    <div class="info-section" style="margin-top:12px">
      <div class="info-label">Prevention</div>
      <div class="info-text" id="res-prevention"></div>
    </div>
    <div class="top3" id="top3-section">
      <div class="info-label" style="margin-bottom:8px">Other possibilities</div>
      <div id="top3-items"></div>
    </div>
    <div class="latency" id="res-latency"></div>
  </div>
</main>

<script>
let selectedFile = null;

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) handleFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    dropZone.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function resetUI() {
  selectedFile = null;
  fileInput.value = '';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  dropZone.style.display = 'block';
}

async function analyzeImage() {
  if (!selectedFile) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';

  const form = new FormData();
  form.append('file', selectedFile);

  try {
    const res = await fetch('/predict', { method: 'POST', body: form });
    if (!res.ok) throw new Error('Prediction failed — please try another image.');
    const data = await res.json();

    document.getElementById('res-disease').textContent = data.display_name;
    document.getElementById('res-class').textContent = data.class_name;
    const sev = document.getElementById('res-severity');
    sev.textContent = data.severity === 'None' ? 'Healthy' : data.severity + ' severity';
    sev.className = 'severity-badge severity-' + data.severity;
    document.getElementById('res-conf-text').textContent = data.confidence + '%';
    setTimeout(() => { document.getElementById('res-conf-bar').style.width = data.confidence + '%'; }, 50);
    document.getElementById('res-cure').textContent = data.cure;
    document.getElementById('res-prevention').textContent = data.prevention;
    document.getElementById('res-latency').textContent = 'Analyzed in ' + data.latency_ms + 'ms';

    const top3 = data.top_3.slice(1);
    document.getElementById('top3-items').innerHTML = top3.map(t =>
      `<div class="top3-item"><span>${t.disease.replace(/___/g,' — ').replace(/_/g,' ')}</span><span>${t.confidence}%</span></div>`
    ).join('');

    document.getElementById('result-card').style.display = 'block';
  } catch(e) {
    const em = document.getElementById('error-msg');
    em.textContent = e.message;
    em.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}
</script>
</body>
</html>
